<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Post for Eorzea</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #fdfaf3;
            --sidebar-bg: #f0e1bd;
            --primary-color: #7d6b5d;
            --text-main: #555555;
            --card-bg: #f5f5f5;
            --card-hover-bg: #ffffff;
            --shadow: 0 8px 18px rgba(90, 70, 50, 0.15);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; min-height: 100vh;
        }

        /* --- サイドバー --- */
        #sidebar {
            width: 260px; background-color: var(--sidebar-bg);
            padding: 25px 15px; position: sticky; top: 0; height: 100vh;
            overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 100;
        }
        #sidebar h1 { font-size: 1.2rem; color: var(--primary-color); margin-bottom: 30px; text-align: center; }
        .nav-group { margin-bottom: 25px; }
        .nav-label { font-size: 0.75rem; font-weight: bold; color: rgba(125,107,93,0.6); margin-bottom: 10px; display: block; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-item {
            display: block; width: 100%; padding: 10px; border: none; background: none;
            text-align: left; cursor: pointer; border-radius: 8px; font-size: 0.9rem;
            color: var(--primary-color); transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.6); font-weight: bold; }
        .nav-item i { margin-right: 10px; width: 18px; text-align: center; }

        /* --- メインコンテンツ --- */
        #main-content { flex: 1; padding: 40px; }

        /* --- ホーム画面 --- */
        #home-view { max-width: 900px; margin: 0 auto; text-align: center; }
        .hero-title { font-size: 2.5rem; color: var(--primary-color); margin-bottom: 5px; }
        .hero-sub { color: #888; margin-bottom: 40px; }
        
        .search-box { max-width: 600px; margin: 0 auto 50px; position: relative; }
        .search-box input {
            width: 100%; padding: 18px 30px; border-radius: 35px;
            border: 2px solid var(--sidebar-bg); font-size: 1.1rem; outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--primary-color); }

        .home-cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; }
        .cat-card {
            background: white; padding: 25px 15px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s;
        }
        .cat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .cat-card i { font-size: 2.2rem; color: var(--primary-color); margin-bottom: 15px; display: block; }
        .cat-card span { font-weight: bold; font-size: 0.85rem; }

        /* --- カタログ画面 --- */
        #catalog-view { display: none; }
        .view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; border-bottom: 2px solid var(--sidebar-bg); padding-bottom: 10px; }
        .back-to-home { cursor: pointer; color: var(--primary-color); font-weight: bold; font-size: 0.9rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        
        /* チェキカード (継承) */
        .cheki-card {
            background-color: var(--card-bg); padding: 12px 12px 18px;
            border-radius: 10px; box-shadow: var(--shadow);
            position: relative; transition: 0.3s;
        }
        .cheki-card:hover { transform: translateY(-5px); background-color: white; }
        .photo-area { position: relative; width: 100%; aspect-ratio: 1; border-radius: 6px; overflow: hidden; margin-bottom: 8px; cursor: pointer; }
        .slide-img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0; transition: 0.3s; }
        .slide-img.active { opacity: 1; }
        .slider-controls { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .slide-btn { background: rgba(0,0,0,0.05); border: none; border-radius: 4px; font-size: 9px; cursor: pointer; padding: 2px 6px; }
        .slide-btn:hover { background: var(--primary-color); color: white; }
        .item-name { font-size: 0.8rem; font-weight: bold; text-align: center; margin: 0; color: var(--primary-color); }

        .patch-divider { grid-column: 1 / -1; margin-top: 30px; font-weight: bold; color: var(--primary-color); border-left: 4px solid var(--primary-color); padding-left: 10px; }

        /* --- モーダル (継承) --- */
        .modal { display: none; position: fixed; z-index: 2000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal.visible { display: flex; }
        .book-layout { display: flex; width: 95%; max-width: 800px; height: 500px; background: #fdfaf3; border-radius: 10px; overflow: hidden; position: relative; }
        .book-left { flex: 1.2; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .book-right { flex: 1; padding: 40px; border-left: 1px solid #ddd; overflow-y: auto; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; }

        @media (max-width: 768px) {
            #sidebar { display: none; } /* 本来はハンバーガーメニュー等に改修推奨 */
            #main-content { padding: 20px; }
            .book-layout { flex-direction: column; height: auto; max-height: 90vh; }
        }
    </style>
</head>
<body>

<nav id="sidebar">
    <h1>Furniture Post</h1>
    
    <div class="nav-group">
        <span class="nav-label">General</span>
        <button class="nav-item active" onclick="showHome()"><i class="fa-solid fa-house"></i>Home</button>
    </div>

    <div class="nav-group">
        <span class="nav-label">Categories</span>
        <div id="side-cat-list"></div>
    </div>

    <div class="nav-group">
        <span class="nav-label">Patch Version</span>
        <div id="side-patch-list"></div>
    </div>
</nav>

<main id="main-content">
    <div id="home-view">
        <h1 class="hero-title">Furniture Catalog</h1>
        <p class="hero-sub">エオルゼアの調度品・庭具コレクション</p>
        
        <div class="search-box">
            <input type="text" id="homeSearch" placeholder="家具の名前で検索..." onkeypress="handleSearch(event)">
        </div>

        <div class="home-cat-grid" id="home-cat-list">
            </div>
    </div>

    <div id="catalog-view">
        <div class="view-header">
            <div class="back-to-home" onclick="showHome()"><i class="fa-solid fa-chevron-left"></i> Home</div>
            <h2 id="view-title" style="margin:0; font-size: 1.2rem; color: var(--primary-color);"></h2>
        </div>
        <div class="grid" id="grid"></div>
    </div>
</main>

<div id="itemModal" class="modal" onclick="closeModal()">
    <div class="book-layout" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="book-left" id="modalPhoto"></div>
        <div class="book-right">
            <h2 id="modalTitle" style="margin-top:0; color:var(--primary-color);"></h2>
            <p id="modalCategory" style="font-weight:bold; color:#888; font-size:0.8rem;"></p>
            <hr style="border:0; border-top:1px dotted #ccc; margin:20px 0;">
            <div id="modalComment" style="font-size: 0.9rem; line-height:1.7;"></div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxW6Gx_zg8upPU10cK2gS9acqg_YRdc79lUzq2qUB0DsMJv0hV2OkCcttbIHoa1AqSemw/exec";
    let allData = [];
    let currentFilter = { type: 'all', value: 'all' };

    window.onload = async function() {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        allData = data.reverse(); // 新着順
        
        buildMenu();
        buildHome();
    };

    function buildMenu() {
        const cats = [...new Set(allData.map(i => i.category))].filter(Boolean);
        const patches = [...new Set(allData.map(i => i.patch))].sort((a,b) => b-a);
        
        const sideCat = document.getElementById('side-cat-list');
        sideCat.innerHTML = cats.map(c => `
            <button class="nav-item" onclick="filterBy('category', '${c}')"><i class="fa-solid fa-couch"></i>${c}</button>
        `).join('');

        const sidePatch = document.getElementById('side-patch-list');
        sidePatch.innerHTML = patches.map(p => `
            <button class="nav-item" onclick="filterBy('patch', '${p}')"><i class="fa-solid fa-tag"></i>Patch ${p}</button>
        `).join('');
    }

    function buildHome() {
        const cats = [...new Set(allData.map(i => i.category))].filter(Boolean);
        const homeGrid = document.getElementById('home-cat-list');
        homeGrid.innerHTML = cats.map(c => `
            <div class="cat-card" onclick="filterBy('category', '${c}')">
                <i class="fa-solid fa-box"></i>
                <span>${c}</span>
            </div>
        `).join('');
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('catalog-view').style.display = 'none';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelector('.nav-item i.fa-house').parentElement.classList.add('active');
    }

    function filterBy(type, value) {
        currentFilter = { type, value };
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('catalog-view').style.display = 'block';
        document.getElementById('view-title').innerText = type === 'patch' ? `Patch ${value}` : value;
        render();
    }

    function handleSearch(e) {
        if (e.key === 'Enter') filterBy('search', e.target.value);
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let lastPatch = "";

        const filtered = allData.filter(item => {
            if (currentFilter.type === 'category') return item.category === currentFilter.value;
            if (currentFilter.type === 'patch') return item.patch === currentFilter.value;
            if (currentFilter.type === 'search') return (item['アイテム名（日）'] || item.name).includes(currentFilter.value);
            return true;
        });

        filtered.forEach((item, index) => {
            // パッチ区切り（カテゴリー別表示の時だけ出すなど調整可能）
            if (currentFilter.type !== 'patch' && item.patch !== lastPatch) {
                const div = document.createElement('div');
                div.className = 'patch-divider';
                div.innerText = `Patch ${item.patch}`;
                grid.appendChild(div);
                lastPatch = item.patch;
            }

            const itemId = item['ItemID'] || item['アイテムID'];
            const card = document.createElement('div');
            card.className = 'cheki-card';
            card.innerHTML = `
                <div class="photo-area" onclick="openModalByIdx(${allData.indexOf(item)})">
                    <img src="images/${itemId}_front.png" class="slide-img active" id="f-${index}" onerror="this.src='https://placehold.jp/200x200.png?text=No%20Image'">
                    <img src="images/${itemId}_bottom.png" class="slide-img" id="b-${index}" onerror="this.style.display='none'">
                </div>
                <div class="slider-controls">
                    <button class="slide-btn" onclick="changeImg(${index}, 'f')">F</button>
                    <button class="slide-btn" onclick="changeImg(${index}, 'b')">B</button>
                </div>
                <p class="item-name">${item['アイテム名（日）'] || item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    function changeImg(idx, side) {
        const f = document.getElementById(`f-${idx}`);
        const b = document.getElementById(`b-${idx}`);
        if(side === 'f') { f.classList.add('active'); b.classList.remove('active'); }
        else if(b.style.display !== 'none') { b.classList.add('active'); f.classList.remove('active'); }
    }

    function openModalByIdx(originalIdx) {
        const item = allData[originalIdx];
        const itemId = item['ItemID'] || item['アイテムID'];
        document.getElementById('modalTitle').innerText = item['アイテム名（日）'] || item.name;
        document.getElementById('modalCategory').innerText = `${item.category} / ${item.genre || 'なし'}`;
        document.getElementById('modalComment').innerText = item.remarks || "備考はありません。";
        document.getElementById('modalPhoto').innerHTML = `<img src="images/${itemId}_front.png" style="max-width:90%; max-height:90%; border-radius:4px;" onerror="this.src='https://placehold.jp/200x200?text=NoImage'">`;
        document.getElementById('itemModal').classList.add('visible');
    }

    function closeModal() { document.getElementById('itemModal').classList.remove('visible'); }
</script>

</body>
</html>
