<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furniture Post for Eorzea</title>
  <style>
    /* あなたのスタイルをここに貼り直してください（長いので省略しますが、そのまま使ってくださいね！） */
    :root { --bg-color: #f0e1bd; --card-bg: #f5f5f5; --card-hover-bg: #ffffff; --text-main: #555555; --text-accent: #7d6b5d; --text-light: #888888; --color-new: #a4343a; --shadow: 0 8px 18px rgba(90, 70, 50, 0.15); }
    * { box-sizing: border-box; }
    body { background-color: var(--bg-color); margin: 0; padding-top: 170px; font-family: "Helvetica Neue", Arial, sans-serif; color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }
    header { position: fixed; top: 0; left: 0; width: 100%; background-color: rgba(240, 225, 189, 0.96); backdrop-filter: blur(8px); z-index: 1000; padding: 10px 15px; text-align: center; }
    .top-controls { display: flex; align-items: center; gap: 8px; max-width: 500px; margin: 0 auto 10px; }
    .search-input { width: 100%; padding: 8px 15px; border-radius: 20px; border: 1px solid rgba(125, 107, 93, 0.2); background-color: var(--card-bg); font-size: 17px; }
    .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (min-width: 600px) { .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; } body { padding-top: 190px; } }
    .cheki-card { background-color: var(--card-bg); padding: 14px 14px 24px 14px; border-radius: 10px; box-shadow: var(--shadow); cursor: pointer; }
    .photo-area { width: 100%; aspect-ratio: 1/1; background-color: #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
    .item-name { font-size: 0.8rem; font-weight: 600; text-align: center; color: var(--text-accent); }
    .filter-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 5px 0; justify-content: center; }
    .filter-chip { padding: 6px 14px; background-color: rgba(125, 107, 93, 0.18); border-radius: 15px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
    .filter-chip.active { background-color: var(--text-accent); color: #ffffff; }
    /* モーダル関連のスタイルもここに含めてください */
  </style>
</head>
<body class="mode-all">
  <header>
    <h1>Furniture Post</h1>
    <div class="top-controls">
      <input type="text" id="searchInput" class="search-input" placeholder="家具を検索..." oninput="render()">
    </div>
    <div class="filter-scroll" id="mainCategoryArea"></div>
    <div class="filter-scroll" id="subMenu"></div>
  </header>
  <main class="catalog-container">
    <div class="catalog-grid" id="grid"></div>
  </main>

  <script>
    let sampleData = [];      
    let currentCategory = 'all'; 
    let currentGenre = 'all';    
    let currentMode = 'all';   
    let displayList = [];

    // ★ここにあなたのGASのURLを貼り付けてください！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxW6Gx_zg8upPU10cK2gS9acqg_YRdc79lUzq2qUB0DsMJv0hV2OkCcttbIHoa1AqSemw/exec";

    window.onload = function() {
        console.log("データの読み込みを開始します...");
        
        // GitHubからGASを呼び出す新しい魔法
        fetch(GAS_URL)
            .then(response => response.json())
            .then(data => {
                console.log("データが届きました！件数:", data.length);
                sampleData = data;
                createFilterButtons();
                render(); 
            })
            .catch(err => {
                console.error("通信エラーが発生しました:", err);
                alert("データの読み込みに失敗しました。GASのデプロイ設定が『全員(Anyone)』になっているか確認してください。");
            });
    };

    function createFilterButtons() {
        const mainArea = document.getElementById('mainCategoryArea');
        const categories = [...new Set(sampleData.map(item => item.category))].filter(c => c && c !== "‐" && c !== "×");
        mainArea.innerHTML = `<button class="filter-chip active" onclick="filterMain('all', this)">すべて</button>`;
        categories.forEach(cat => {
            mainArea.innerHTML += `<button class="filter-chip" onclick="filterMain('${cat}', this)">${cat}</button>`;
        });
    }

    function filterMain(cat, element) {
        currentCategory = cat;
        currentGenre = 'all'; 
        document.querySelectorAll('#mainCategoryArea .filter-chip').forEach(btn => btn.classList.remove('active'));
        if(element) element.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const searchText = searchInput ? searchInput.value.toLowerCase() : "";
        grid.innerHTML = '';

        displayList = sampleData.filter(item => {
            if (!item) return false;
            const name = String(item.name || "").toLowerCase();
            const img = String(item.image || "");
            const hasImage = img !== "" && img !== "‐" && img !== "-";
            const categoryMatch = (currentCategory === 'all' || item.category === currentCategory);
            const nameMatch = name.includes(searchText);
            return hasImage && categoryMatch && nameMatch;
        });

        displayList.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'cheki-card';
            card.innerHTML = `
                <div class="photo-area">
                    <img src="${item.image}" style="width:100%; height:100%; object-fit: cover;" onerror="this.src='https://placehold.jp/24/cccccc/ffffff/200x200.png?text=No%20Image'">
                </div>
                <p class="item-name">${item.name || "名称不明"}</p>
            `;
            grid.appendChild(card);
        });
    }
  </script>
</body>
</html>
